<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#visitor-monitoring">Visitor Monitoring</a></li>
            <li><a href="#ip-tracking">IP Tracking</a></li>
            <li><a href="#block-system">Blocking System</a></li>
            <li><a href="#alerts">Alerts</a></li>
            <li><a href="#login">Login Authentication</a></li>
            <li><a href="#analytics">Real-Time Analytics</a></li>
        </ul>
    </nav>

    <main>
        <section id="visitor-monitoring">
            <h2>Visitor Monitoring</h2>
            <div id="visitor-list">
                <!-- Dynamic visitor list will be displayed here -->
            </div>
        </section>

        <section id="ip-tracking">
            <h2>IP Tracking</h2>
            <div id="ip-list">
                <!-- Dynamic IP tracking information will be displayed here -->
            </div>
        </section>

        <section id="block-system">
            <h2>Blocking System</h2>
            <form id="block-ip-form">
                <input type="text" placeholder="Enter IP address to block" />
                <button type="submit">Block IP</button>
            </form>
        </section>

        <section id="alerts">
            <h2>Alerts</h2>
            <div id="alert-list">
                <!-- Alerts will be displayed here -->
            </div>
        </section>

        <section id="login">
            <h2>Login Authentication</h2>
            <form id="login-form">
                <input type="text" placeholder="Username" required />
                <input type="password" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
        </section>

        <section id="analytics">
            <h2>Real-Time Analytics</h2>
            <div id="analytics-dashboard">
                <!-- Real-time analytics data will be displayed here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Admin Dashboard</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
