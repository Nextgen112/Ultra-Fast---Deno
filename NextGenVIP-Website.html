<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen VIP Website</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1, h2 {
            color: #e0e0e0;
        }
        .counter {
            margin: 20px 0;
            padding: 10px;
            background-color: #1e1e1e;
            border-radius: 5px;
            text-align: center;
        }
        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.8em;
            color: #999;
        }
    </style>
</head>
<body>
    <h1>Welcome to NextGen VIP</h1>
    <div class="counter" id="visitorCounter">Visitors: <span id="count">0</span></div>
    <script>
        let visitors = localStorage.getItem('visitorCount') || 0;
        visitors++;
        localStorage.setItem('visitorCount', visitors);
        document.getElementById('count').textContent = visitors;
    </script>
    <footer>
        <p>&copy; 2026 NextGen112. All rights reserved.</p>
    </footer>
</body>
</html>
